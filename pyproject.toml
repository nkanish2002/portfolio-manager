[project]
name = "portfolio-manager"
version = "0.1.0"
description = "Professional portfolio management tool with Schwab asset-class support"
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.115",
    "uvicorn[standard]>=0.34",
    "sqlalchemy>=2.0",
    "pydantic-settings>=2.0",
    "pandas>=2.2",
    "numpy>=2.0",
    "plotly>=5.24",
    "jinja2>=3.1",
    "python-multipart>=0.0.18",
    "alembic>=1.14",
    "aiosqlite>=0.20",
    "yfinance>=0.2",
    "structlog>=26.1.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.24",
    "httpx>=0.28",
    "ruff>=0.8",
]

[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP", "B"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
