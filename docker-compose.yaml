version: "3.8"

services:
    portfolio-manager:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: portfolio-manager
        volumes:
            - portfolio-data:/app/data
        environment:
            - DATABASE_URL=sqlite+aiosqlite:///data/portfolio.db
            - DEBUG=false
        # Note: Textual UI runs in terminal. Use:
        #   podman run --rm -it -v portfolio-data:/app/data portfolio-manager uv run textual portfolio_manager
        # Or just run locally: uv run textual portfolio_manager

volumes:
    portfolio-data:
        driver: local
