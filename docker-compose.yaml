version: "3.8"

services:
    portfolio-manager:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: portfolio-manager
        ports:
            - "0.0.0.0:8000:8000"
        volumes:
            - portfolio-data:/app/data
        environment:
            - DATABASE_URL=sqlite+aiosqlite:///data/portfolio.db
            - DEBUG=false
        command: ["solara", "run", "portfolio_manager.solara_app", "--host", "0.0.0.0", "--port", "8000"]
        restart: unless-stopped

volumes:
    portfolio-data:
        driver: local
