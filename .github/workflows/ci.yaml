name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "feature/**"

jobs:
  lint-and-test:
    name: Lint + Tests
    runs-on: ubuntu-latest

    # Postgres service container — matches the local docker-compose setup.
    # Tests create the `portfolio_manager_test` DB themselves via asyncpg.
    services:
      postgres:
        image: docker.io/library/postgres:16-alpine
        env:
          POSTGRES_USER: portfolio
          POSTGRES_PASSWORD: portfolio
          POSTGRES_DB: portfolio_manager
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U portfolio -d portfolio_manager"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      ENV_FOR_DYNACONF: development

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python 3.14
        run: uv python install 3.14

      - name: Install dependencies
        run: uv sync --frozen

      - name: Ruff check
        run: uv run ruff check .

      - name: Run tests
        run: uv run pytest tests/ -q